<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GazCalc Studio - Metodat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .method-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.8s ease;
      cursor: pointer;
      opacity: 0;
      animation: fadeIn 1s forwards;
    }
    .method-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
    }
    #footer {
      margin-top: auto;
    }
  </style>
</head>
<body class="bg-light">

<!-- Header / Brand -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">Gazmend</span>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="text-center mb-4">Zgjidh metodën e llogaritjes</h2>
  
  <div class="row justify-content-center">
    <!-- Card për Gumbel -->
    <div class="col-md-4 mb-4">
      <div class="card method-card text-center">
        <div class="card-header bg-primary text-white">
          Metoda e Gumbelit
        </div>
        <div class="card-body">
          <p>Llogaritja e prurjeve ekstreme sipas shpërndarjes Gumbel.</p>
          <a href="Gumbeli.html" class="btn btn-primary">Hape metodën</a>
        </div>
      </div>
    </div>
    
    <!-- Card për Normale -->
    <div class="col-md-4 mb-4">
      <div class="card method-card text-center">
        <div class="card-header bg-success text-white">
          Metoda Normale
        </div>
        <div class="card-body">
          <p>Llogaritja e prurjeve ekstreme sipas shpërndarjes normale.</p>
          <a href="Metoda_Normale.html" class="btn btn-success">Hape metodën</a>
        </div>
      </div>
    </div>
  </div>
</div>



</body>
</html>
